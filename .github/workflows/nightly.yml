name: Nightly live regressions

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-live-regressions
  cancel-in-progress: true

jobs:
  secondary-live-mvp:
    name: secondary live MVP
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: ./scripts/run-ai-verify --mode nightly-live-mvp
