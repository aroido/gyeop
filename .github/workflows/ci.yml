name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  base:
    name: base (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        mode: [ci-static, ci-data, ci-mock]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - if: ${{ matrix.mode == 'ci-mock' }}
        run: pnpm exec playwright install --with-deps chromium
      - run: ./scripts/run-ai-verify --mode ${{ matrix.mode }}
        env:
          GYEOP_VERIFY_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}

  live:
    name: live (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        mode: [ci-live-mvp, ci-live-owner]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: ./scripts/run-ai-verify --mode ${{ matrix.mode }}

  verify:
    name: verify
    if: ${{ always() }}
    needs: [base, live]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all verification lanes
        env:
          BASE_RESULT: ${{ needs.base.result }}
          LIVE_RESULT: ${{ needs.live.result }}
        run: |
          test "$BASE_RESULT" = success && test "$LIVE_RESULT" = success
